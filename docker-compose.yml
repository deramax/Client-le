# ClienTara — pile complète (PostgreSQL + Django + React/nginx + LDAP de test).
#
#   cp .env.example .env          # puis adapter si besoin
#   docker compose up --build     # http://localhost:8080  (admin / Clientara2026!)
#   docker compose --profile ldap up --build   # + annuaire LDAP de démonstration
#
name: clientara

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-clientara}
      POSTGRES_USER: ${DB_USER:-clientara}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clientara}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clientara}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: [.env]
    environment:
      DB_HOST: db          # nom du service Postgres dans le réseau compose
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"        # API + admin Django accessibles directement
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    depends_on:
      - backend
    ports:
      - "8080:80"          # l'application : http://localhost:8080
    restart: unless-stopped

  # Annuaire LDAP de démonstration — lancé uniquement avec --profile ldap.
  openldap:
    image: osixia/openldap:1.5.0
    profiles: ["ldap"]
    environment:
      LDAP_ORGANISATION: "ClienTara"
      LDAP_DOMAIN: "clientara.local"
      LDAP_ADMIN_PASSWORD: "admin"
    command: ["--copy-service"]
    volumes:
      - ./ldap/seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-seed.ldif:ro
    ports:
      - "389:389"

volumes:
  pgdata:
